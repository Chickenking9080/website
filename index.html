<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turbo Chook Games</title>
    <style>
        :root {
            --primary: #ffcc00; /* Turbo Chook Yellow */
            --bg: #0f0f0f;
            --card-bg: #1a1a1a;
            --text: #ffffff;
            --accent-z: #00ffcc; /* Protocol Z Cyan */
            --accent-racer: #ff4444; /* Rapid Racer Red */
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        /* --- HEADER & LOGO --- */
        header {
            padding: 3rem 1rem;
            text-align: center;
            /* SWAP HEADER BACKGROUND BELOW */
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('header-bg.jpg');
            background-size: cover;
            background-position: center;
            border-bottom: 3px solid var(--primary);
        }

        .logo-container img {
            max-width: 120px; /* Smaller for mobile */
            height: auto;
            margin-bottom: 1rem;
        }

        @media (min-width: 768px) {
            .logo-container img { max-width: 180px; }
        }

        .studio-name {
            font-size: 2.2rem;
            margin: 0;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* --- LAYOUT --- */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        .game-grid {
            display: grid;
            grid-template-columns: 1fr; /* Stacked on mobile */
            gap: 2rem;
        }

        @media (min-width: 850px) {
            .game-grid { grid-template-columns: 1fr 1fr; } /* Side-by-side on desktop */
        }

        /* --- GAME CARDS --- */
        .game-card {
            background: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
            border: 1px solid #333;
        }

        .game-card:hover {
            transform: translateY(-5px);
        }

        .game-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: #222; /* Placeholder color */
        }

        .game-info {
            padding: 1.5rem;
            flex-grow: 1;
        }

        .protocol-z { border-top: 5px solid var(--accent-z); }
        .rapid-racer { border-top: 5px solid var(--accent-racer); }

        .btn {
            display: inline-block;
            background: var(--primary);
            color: #000;
            padding: 0.8rem 1.5rem;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            margin-top: 1rem;
            text-align: center;
        }

        .btn-itch {
            background: #fa5c5c; /* itch.io red */
            color: white;
        }

        footer {
            text-align: center;
            padding: 4rem 1rem;
            opacity: 0.5;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="logo.png" alt="Turbo Chook Logo">
        </div>
        <h1 class="studio-name">Turbo Chook Games</h1>
    </header>

    <div class="container">
        <div class="game-grid">
            
            <article class="game-card protocol-z">
                <img src="protocol-z-thumb.jpg" alt="Protocol Z" class="game-img">
                <div class="game-info">
                    <h2 style="color: var(--accent-z);">Protocol Z</h2>
                    <p>High-stakes 3D multiplayer survival. Every decision matters when the protocol is active.</p>
                    <span style="font-size: 0.8rem; background: #333; padding: 3px 8px; border-radius: 3px;">3D MULTIPLAYER</span>
                </div>
            </article>

            <article class="game-card rapid-racer">
                <img src="rapid-racer-thumb.jpg" alt="Rapid Racer" class="game-img">
                <div class="game-info">
                    <h2 style="color: var(--accent-racer);">Rapid Racer</h2>
                    <p>Breakneck speeds and tight corners. The ultimate arcade racing experience.</p>
                    <a href="https://itch.io" class="btn btn-itch" target="_blank">Play on itch.io</a>
                </div>
            </article>

        </div>
    </div>

    <footer>
        <p>&copy; 2026 Turbo Chook Games</p>
    </footer>

</body>
</html>
