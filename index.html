<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@300;600&display=swap" rel="stylesheet">

<title>Turbo Chook Games</title>

<style>
:root {
    --primary: #ffcc00;
    --bg: #050505;
    --card: rgba(20,20,20,0.7);
    --text: #ffffff;
}

/* BASE */
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: radial-gradient(circle at top, #1a1a1a, #050505);
    color: var(--text);
    overflow-x: hidden;
}

/* HERO */
header {
    text-align: center;
    padding: 6rem 1rem;
}

.logo {
    width: 120px;
    margin-bottom: 1rem;
}

h1 {
    font-family: 'Press Start 2P', cursive;
    font-size: 2.5rem;
    color: var(--primary);
    text-shadow: 0 0 5px var(--primary), 0 0 20px rgba(255,204,0,0.4);
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from {text-shadow: 0 0 5px var(--primary), 0 0 20px rgba(255,204,0,0.4);}
    to {text-shadow: 0 0 15px var(--primary), 0 0 40px rgba(255,204,0,0.7);}
}

.hero-text {
    opacity: 0.7;
    margin-top: 0.5rem;
}

/* BUTTON */
.btn {
    margin-top: 20px;
    padding: 12px 25px;
    background: var(--primary);
    border: none;
    font-weight: bold;
    cursor: pointer;
    border-radius: 6px;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.1);
    box-shadow: 0 0 20px var(--primary);
}

/* SECTION */
.section {
    max-width: 1100px;
    margin: auto;
    padding: 2rem;
}

/* GAME GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 2rem;
}

/* CARDS (UPGRADED) */
.card {
    background: var(--card);
    border-radius: 20px;
    overflow: hidden;
    position: relative;
    transition: 0.4s;
    border: 1px solid rgba(255,255,255,0.1);
}

.card:hover {
    transform: perspective(600px) rotateX(3deg) rotateY(-3deg) translateY(-10px) scale(1.05);
    box-shadow: 0 10px 40px rgba(255,204,0,0.5);
    border: 2px solid var(--primary);
}

/* IMAGE */
.card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    transition: 0.4s;
}

.card:hover img {
    transform: scale(1.1);
}

/* OVERLAY */
.overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.7);
    opacity: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: 0.3s;
    text-align: center;
}

.card:hover .overlay {
    opacity: 1;
}

/* OVERLAY TEXT */
.overlay-text {
    color: var(--primary);
    font-family: 'Press Start 2P', monospace;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

/* CONTENT */
.card-content {
    padding: 1.5rem;
}

/* DEVLOG */
.devlog {
    background: #111;
    border: 1px solid var(--primary);
    border-radius: 15px;
    padding: 1rem;
    max-height: 200px;
    overflow-y: auto;
    font-family: 'Press Start 2P', monospace;
    color: var(--primary);
    box-shadow: 0 0 15px rgba(255,204,0,0.3) inset;
}

/* MODAL */
#modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    z-index: 999;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

/* LOADING SCREEN */
#loader {
    position: absolute;
    color: white;
    font-family: 'Press Start 2P';
}

/* GAME FRAME */
iframe {
    width: 90%;
    height: 90%;
    border: none;
    display: none;
    border-radius: 15px;
}

/* CLOSE */
.close {
    position: absolute;
    top: 20px;
    right: 30px;
    font-size: 2rem;
    cursor: pointer;
}

/* FADE ANIM */
.fade-in {
    animation: fade 0.5s;
}

@keyframes fade {
    from {opacity:0;}
    to {opacity:1;}
}
</style>
</head>

<body>

<header>
    <img src="logo.svg" class="logo">
    <h1>BUILD. SURVIVE. RACE.</h1>
    <p class="hero-text">Indie chaos games built with passion.</p>
</header>

<section class="section">
<h2>Games</h2>
<div class="grid">

<!-- PROTOCOL Z / 3D SURVIVAL -->
<div class="card">
    <img src="protocol-z-thumb.jpg">
    <div class="overlay">
        <div class="overlay-text">
            <p>Latest update: Multiplayer improvements!</p>
            <button class="btn" onclick="openProtocol()">Play</button>
        </div>
    </div>
    <div class="card-content">
        <h3>Protocol Z</h3>
        <p>Zombie survival with building + multiplayer.</p>
    </div>
</div>

<!-- EXTREME RACER -->
<div class="card">
    <img src="rapid-racer-thumb.jpg">
    <div class="overlay">
        <div class="overlay-text">
            <button class="btn" onclick="openRacer()">Play</button>
        </div>
    </div>
    <div class="card-content">
        <h3>Extreme Racer</h3>
        <p>Fast reflex racing.</p>
    </div>
</div>

</div>
</section>

<section class="section">
<h2>Devlog</h2>
<div class="devlog" id="devlog">
Loading...
</div>
</section>

<!-- MODAL -->
<div id="modal">
    <div class="close" onclick="closeGame()">×</div>
    <div id="loader">Launching Game...</div>
    <iframe id="frame"></iframe>
</div>

<script>
// DEVLOG LOADER (animated line-by-line)
fetch('devlog.txt')
.then(res => res.text())
.then(text => {
    const lines = text.split('\n');
    const devlogEl = document.getElementById('devlog');
    devlogEl.innerHTML = '';
    let i = 0;
    function addLine() {
        if(i < lines.length){
            const line = document.createElement('div');
            line.textContent = lines[i++];
            devlogEl.appendChild(line);
            devlogEl.scrollTop = devlogEl.scrollHeight;
            setTimeout(addLine, 300);
        }
    }
    addLine();
})
.catch(() => {
    document.getElementById('devlog').innerText = "No devlog yet.";
});

// GAME LAUNCHERS
function openProtocol(){
    launch('https://itch.io/embed/4388254');
}

function openRacer(){
    launch('https://itch.io/embed-upload/16772499');
}

function launch(link){
    const modal = document.getElementById('modal');
    const frame = document.getElementById('frame');
    const loader = document.getElementById('loader');

    modal.style.display = 'flex';
    modal.classList.add('fade-in');

    frame.style.display = 'none';
    loader.style.display = 'block';

    frame.src = link;

    frame.onload = () => {
        loader.style.display = 'none';
        frame.style.display = 'block';
    };
}

function closeGame(){
    const modal = document.getElementById('modal');
    const frame = document.getElementById('frame');
    modal.style.display = 'none';
    frame.src = '';
}

// ESC CLOSE
document.addEventListener('keydown', e=>{
    if(e.key === "Escape") closeGame();
});
</script>

</body>
</html>
