<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@300;600&display=swap" rel="stylesheet">

<title>Turbo Chook Games</title>

<style>
:root {
    --primary: #ffcc00;
    --bg: #050505;
    --card: rgba(20,20,20,0.7);
    --text: #ffffff;
}

/* BASE */
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #050505;
    color: var(--text);
    overflow-x: hidden;
    position: relative;
}

/* STARS */
body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: transparent;
    box-shadow:
        50px 80px white,
        200px 150px white,
        400px 300px white,
        600px 500px white,
        800px 200px white,
        1000px 350px white,
        1200px 450px white;
    z-index: 0;
}

/* HERO */
header {
    text-align: center;
    padding: 6rem 1rem;
    position: relative;
    z-index: 1;
}

.logo {
    width: 120px;
    margin-bottom: 1rem;
}

h1 {
    font-family: 'Press Start 2P', cursive;
    font-size: 2rem;
    color: var(--primary);
}

.hero-text {
    opacity: 0.7;
}

/* BUTTON */
.btn {
    margin-top: 20px;
    padding: 12px 25px;
    background: var(--primary);
    border: none;
    font-weight: bold;
    cursor: pointer;
    border-radius: 6px;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.05);
}

/* SECTION */
.section {
    max-width: 1100px;
    margin: auto;
    padding: 2rem;
    position: relative;
    z-index: 1;
}

/* GAME GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 2rem;
}

/* CARDS */
.card {
    background: var(--card);
    border-radius: 15px;
    overflow: hidden;
    position: relative;
    transition: 0.3s;
    border: 1px solid rgba(255,255,255,0.1);
}

.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 0 15px rgba(255,255,255,0.1);
}

.card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    transition: 0.3s;
}

.card:hover img {
    transform: scale(1.05);
}

/* OVERLAY */
.overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.6);
    opacity: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: 0.3s;
}

.card:hover .overlay {
    opacity: 1;
}

/* CARD CONTENT */
.card-content {
    padding: 1rem;
}

/* DEVLOG */
.devlog {
    background: var(--card);
    border-radius: 10px;
    padding: 1rem;
    max-height: 200px;
    overflow-y: auto;
    font-size: 0.9rem;
}

/* MODAL */
#modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    z-index: 999;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

#loader {
    color: white;
    font-family: 'Press Start 2P';
}

iframe {
    width: 90%;
    height: 90%;
    border: none;
    display: none;
    border-radius: 10px;
}

.close {
    position: absolute;
    top: 20px;
    right: 30px;
    font-size: 2rem;
    cursor: pointer;
}

.fade-in {
    animation: fade 0.5s;
}

@keyframes fade {
    from {opacity:0;}
    to {opacity:1;}
}
</style>
</head>

<body>

<header>
    <img src="logo.svg" class="logo">
    <h1>BUILD. SURVIVE. RACE.</h1>
    <p class="hero-text">Indie chaos games built with passion.</p>
</header>

<section class="section">
<h2>Games</h2>
<div class="grid">

<!-- PROTOCOL Z -->
<div class="card">
    <img src="protocol-z-thumb.jpg">
    <div class="overlay">
        <button class="btn" onclick="openProtocol()">Play</button>
    </div>
    <div class="card-content">
        <h3>Protocol Z</h3>
        <p>Zombie survival with building + multiplayer.</p>
    </div>
</div>

<!-- EXTREME RACER -->
<div class="card">
    <img src="rapid-racer-thumb.jpg">
    <div class="overlay">
        <button class="btn" onclick="openRacer()">Play</button>
    </div>
    <div class="card-content">
        <h3>Extreme Racer</h3>
        <p>Fast reflex racing.</p>
    </div>
</div>

</div>
</section>

<section class="section">
<h2>Devlog</h2>
<div class="devlog" id="devlog">
Loading...
</div>
</section>

<div id="modal">
    <div class="close" onclick="closeGame()">×</div>
    <div id="loader">Launching Game...</div>
    <iframe id="frame"></iframe>
</div>

<script>
// Devlog loader
fetch('devlog.txt')
.then(res => res.text())
.then(text => {
    const devlogEl = document.getElementById('devlog');
    devlogEl.innerText = text;
})
.catch(() => {
    document.getElementById('devlog').innerText = "No devlog yet.";
});

// Game launchers
function openProtocol(){ launch('https://itch.io/embed/4388254'); }
function openRacer(){ launch('https://itch.io/embed-upload/16772499'); }

function launch(link){
    const modal = document.getElementById('modal');
    const frame = document.getElementById('frame');
    const loader = document.getElementById('loader');

    modal.style.display = 'flex';
    modal.classList.add('fade-in');

    frame.style.display = 'none';
    loader.style.display = 'block';

    frame.src = link;

    frame.onload = () => {
        loader.style.display = 'none';
        frame.style.display = 'block';
    };
}

function closeGame(){
    const modal = document.getElementById('modal');
    const frame = document.getElementById('frame');
    modal.style.display = 'none';
    frame.src = '';
}

document.addEventListener('keydown', e=>{
    if(e.key === "Escape") closeGame();
});
</script>

</body>
</html>
