<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="logo.svg">
<title>Turbo Chook Games</title>

<style>
:root {
    --primary: #ffcc00;
    --bg: #0a0a0a;
    --card-bg: rgba(30,30,30,0.6);
    --text: #ffffff;
    --accent-z: #00ffcc;
    --accent-racer: #ff4444;
}

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: radial-gradient(circle at top, #1a1a1a, #050505);
    color: var(--text);
    overflow-x: hidden;
}

/* BACKGROUND */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
}

/* HEADER */
header {
    text-align: center;
    padding: 6rem 1rem;
}

.logo-container img {
    max-width: 150px;
    animation: float 4s ease-in-out infinite;
}

.studio-name {
    font-size: 3rem;
    color: var(--primary);
    letter-spacing: 4px;
}

.hero-text {
    opacity: 0.8;
    font-size: 1.2rem;
}

/* BUTTON */
.btn {
    display: inline-block;
    margin-top: 25px;
    padding: 14px 30px;
    background: var(--primary);
    color: black;
    border-radius: 8px;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
    cursor: pointer;
}

.btn:hover {
    transform: scale(1.1);
    box-shadow: 0 0 20px var(--primary);
}

/* LAYOUT */
.container {
    max-width: 1200px;
    margin: auto;
    padding: 2rem;
}

.game-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 2rem;
}

/* GAME CARDS */
.game-card {
    background: var(--card-bg);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    overflow: hidden;
    transition: 0.4s;
}

.game-card:hover {
    transform: translateY(-12px) scale(1.03);
    box-shadow: 0 0 30px rgba(255,255,255,0.15);
}

.game-img {
    width: 100%;
    height: 220px;
    object-fit: cover;
}

.game-info {
    padding: 1.5rem;
}

.protocol-z { border-top: 4px solid var(--accent-z); }
.rapid-racer { border-top: 4px solid var(--accent-racer); }

.tag {
    display: inline-block;
    margin-top: 10px;
    font-size: 0.75rem;
    background: #333;
    padding: 5px 10px;
    border-radius: 5px;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 3rem 1rem;
    opacity: 0.5;
}

/* FLOAT ANIMATION */
@keyframes float {
    0% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
    100% { transform: translateY(0); }
}

/* MODAL */
#gameModal {
    display: none;
    position: fixed;
    z-index: 999;
    inset: 0;
    background: rgba(0,0,0,0.9);
    justify-content: center;
    align-items: center;
}

#gameModal iframe {
    width: 1152px;
    height: 668px;
    max-width: 95%;
    max-height: 90%;
    border: none;
    border-radius: 12px;
}

/* CLOSE BUTTON */
#closeModal {
    position: absolute;
    top: 20px;
    right: 40px;
    font-size: 2rem;
    color: white;
    cursor: pointer;
}

/* LOADING */
#loadingScreen {
    position: absolute;
    color: white;
    font-size: 1.5rem;
}

/* FADE */
.fade-in {
    animation: fadeIn 0.4s ease forwards;
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<header>
    <div class="logo-container">
        <img src="logo.svg">
    </div>
    <h1 class="studio-name">Turbo Chook Games</h1>
    <p class="hero-text">Fast. Chaotic. Addictive.</p>
    <a href="#games" class="btn">Explore Games</a>
</header>

<div class="container" id="games">
    <div class="game-grid">

        <div class="game-card protocol-z">
            <img src="protocol-z-thumb.jpg" class="game-img">
            <div class="game-info">
                <h2 style="color: var(--accent-z);">Protocol Z</h2>
                <p>Survive in a chaotic zombie world.</p>
                <span class="tag">3D MULTIPLAYER</span><br>
                <a href="#" class="btn">Play / Download</a>
            </div>
        </div>

        <div class="game-card rapid-racer">
            <img src="rapid-racer-thumb.jpg" class="game-img">
            <div class="game-info">
                <h2 style="color: var(--accent-racer);">Extreme Racer</h2>
                <p>High-speed racing madness.</p>
                <span class="tag">2D RACING</span><br>
                <button class="btn" onclick="openGame()">Play Here</button>
            </div>
        </div>

    </div>
</div>

<footer>
    <p>© 2026 Turbo Chook Games</p>
</footer>

<!-- MODAL -->
<div id="gameModal">
    <span id="closeModal" onclick="closeGame()">×</span>
    <div id="loadingScreen">Launching Game...</div>
    <iframe id="gameFrame"></iframe>
</div>

<script>
// PARTICLES
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');
canvas.width = innerWidth;
canvas.height = innerHeight;

let particles = [];
for (let i = 0; i < 80; i++) {
    particles.push({
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height,
        r: Math.random()*2,
        dx: (Math.random()-0.5)*0.5,
        dy: (Math.random()-0.5)*0.5
    });
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{
        p.x+=p.dx; p.y+=p.dy;
        if(p.x<0||p.x>canvas.width) p.dx*=-1;
        if(p.y<0||p.y>canvas.height) p.dy*=-1;
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle='rgba(255,255,255,0.5)';
        ctx.fill();
    });
    requestAnimationFrame(animate);
}
animate();

// GAME MODAL
function openGame(){
    const modal = document.getElementById('gameModal');
    const frame = document.getElementById('gameFrame');
    const loading = document.getElementById('loadingScreen');

    modal.style.display='flex';
    modal.classList.add('fade-in');

    loading.style.display='block';
    frame.style.display='none';

    frame.src='https://itch.io/embed-upload/16772499?color=333333';

    frame.onload=()=>{
        loading.style.display='none';
        frame.style.display='block';
    };
}

function closeGame(){
    const modal=document.getElementById('gameModal');
    const frame=document.getElementById('gameFrame');

    modal.style.display='none';
    frame.src='';
}

// CLOSE OUTSIDE
window.onclick = (e)=>{
    if(e.target.id==='gameModal') closeGame();
};

// ESC CLOSE
document.addEventListener('keydown',(e)=>{
    if(e.key==='Escape') closeGame();
});
</script>

</body>
</html>
