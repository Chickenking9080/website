<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="logo.svg">
<title>Turbo Chook Games</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ===================== VARIABLES ===================== */
:root {
  --primary: #ffcc00;
  --bg: #060608;
  --surface: rgba(255,255,255,0.04);
  --surface-hover: rgba(255,255,255,0.08);
  --text: #f0f0f0;
  --muted: rgba(240,240,240,0.45);
  --accent-z: #00ffcc;
  --accent-racer: #ff4444;
  --accent-devlog: #a78bfa;
  --border: rgba(255,255,255,0.08);
  --glow-yellow: 0 0 40px rgba(255,204,0,0.25);
  --glow-cyan: 0 0 40px rgba(0,255,204,0.2);
  --font-display: 'Bebas Neue', sans-serif;
  --font-mono: 'Space Mono', monospace;
  --font-body: 'DM Sans', sans-serif;
  --nav-h: 64px;
}

/* ===================== RESET ===================== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  overflow-x: hidden;
  line-height: 1.6;
}

/* ===================== CANVAS ===================== */
#bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

/* ===================== NAV ===================== */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--nav-h);
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 2rem;
  background: rgba(6,6,8,0.7);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  transition: background 0.3s;
}

.nav-logo {
  display: flex;
  align-items: center;
  gap: 0.7rem;
  text-decoration: none;
}

.nav-logo img {
  width: 36px;
  height: 36px;
}

.nav-logo-text {
  font-family: var(--font-display);
  font-size: 1.4rem;
  letter-spacing: 2px;
  color: var(--primary);
}

.nav-links {
  display: flex;
  gap: 0.25rem;
  list-style: none;
}

.nav-links a {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  letter-spacing: 1px;
  color: var(--muted);
  text-decoration: none;
  padding: 6px 14px;
  border-radius: 6px;
  transition: all 0.2s;
  text-transform: uppercase;
}

.nav-links a:hover {
  color: var(--text);
  background: var(--surface-hover);
}

.nav-cta {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 8px 20px;
  background: var(--primary);
  color: #000;
  border-radius: 6px;
  text-decoration: none;
  font-weight: 700;
  transition: all 0.2s;
}

.nav-cta:hover {
  box-shadow: var(--glow-yellow);
  transform: translateY(-1px);
}

/* Hamburger */
.hamburger {
  display: none;
  flex-direction: column;
  gap: 5px;
  cursor: pointer;
  padding: 4px;
  background: none;
  border: none;
}

.hamburger span {
  display: block;
  width: 24px;
  height: 2px;
  background: var(--text);
  border-radius: 2px;
  transition: all 0.3s;
}

.hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
.hamburger.open span:nth-child(2) { opacity: 0; }
.hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

.mobile-menu {
  display: none;
  position: fixed;
  top: var(--nav-h);
  inset-inline: 0;
  background: rgba(6,6,8,0.97);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 1.5rem 2rem;
  z-index: 99;
  flex-direction: column;
  gap: 0.5rem;
}

.mobile-menu.open { display: flex; }

.mobile-menu a {
  font-family: var(--font-mono);
  font-size: 0.85rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  text-decoration: none;
  padding: 0.75rem 0;
  border-bottom: 1px solid var(--border);
  transition: color 0.2s;
}

.mobile-menu a:hover { color: var(--primary); }

/* ===================== HERO ===================== */
.hero {
  position: relative;
  min-height: 100svh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: calc(var(--nav-h) + 3rem) 1.5rem 4rem;
  z-index: 1;
}

.hero-eyebrow {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--primary);
  margin-bottom: 1.5rem;
  opacity: 0;
  animation: fadeUp 0.6s 0.2s ease forwards;
}

.hero-logo {
  width: 120px;
  margin-bottom: 1.5rem;
  opacity: 0;
  animation: fadeUp 0.6s 0.4s ease forwards, float 5s 1s ease-in-out infinite;
  filter: drop-shadow(0 0 20px rgba(255,204,0,0.4));
}

.hero h1 {
  font-family: var(--font-display);
  font-size: clamp(3.5rem, 10vw, 8rem);
  line-height: 0.9;
  letter-spacing: 6px;
  color: var(--primary);
  text-shadow: 0 0 80px rgba(255,204,0,0.15);
  opacity: 0;
  animation: fadeUp 0.6s 0.6s ease forwards;
}

.hero h1 .line-2 {
  display: block;
  color: transparent;
  -webkit-text-stroke: 2px var(--primary);
  opacity: 0.6;
}

.hero-sub {
  font-family: var(--font-body);
  font-size: 1.1rem;
  color: var(--muted);
  margin-top: 1.5rem;
  max-width: 480px;
  opacity: 0;
  animation: fadeUp 0.6s 0.8s ease forwards;
}

.hero-buttons {
  display: flex;
  gap: 1rem;
  flex-wrap: wrap;
  justify-content: center;
  margin-top: 2.5rem;
  opacity: 0;
  animation: fadeUp 0.6s 1s ease forwards;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  padding: 14px 32px;
  background: var(--primary);
  color: #000;
  font-family: var(--font-mono);
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  text-decoration: none;
  border-radius: 8px;
  transition: all 0.25s;
  border: none;
  cursor: pointer;
}

.btn-primary:hover {
  box-shadow: var(--glow-yellow);
  transform: translateY(-2px);
}

.btn-ghost {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  padding: 14px 32px;
  background: transparent;
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  text-decoration: none;
  border-radius: 8px;
  border: 1px solid var(--border);
  transition: all 0.25s;
}

.btn-ghost:hover {
  border-color: var(--primary);
  color: var(--primary);
  background: rgba(255,204,0,0.05);
}

.hero-scroll {
  position: absolute;
  bottom: 2rem;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  font-family: var(--font-mono);
  font-size: 0.6rem;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--muted);
  opacity: 0;
  animation: fadeUp 0.6s 1.4s ease forwards;
}

.scroll-line {
  width: 1px;
  height: 40px;
  background: linear-gradient(to bottom, var(--primary), transparent);
  animation: scrollPulse 2s ease-in-out infinite;
}

/* ===================== STATS BAR ===================== */
.stats-bar {
  position: relative;
  z-index: 1;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  background: rgba(255,255,255,0.02);
  backdrop-filter: blur(10px);
  padding: 1.5rem;
}

.stats-inner {
  max-width: 1100px;
  margin: auto;
  display: flex;
  justify-content: space-around;
  flex-wrap: wrap;
  gap: 1.5rem;
}

.stat-item {
  text-align: center;
}

.stat-num {
  font-family: var(--font-display);
  font-size: 2.4rem;
  color: var(--primary);
  line-height: 1;
}

.stat-label {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--muted);
  margin-top: 4px;
}

/* ===================== SHARED SECTION ===================== */
.section {
  position: relative;
  z-index: 1;
  max-width: 1100px;
  margin: 0 auto;
  padding: 5rem 1.5rem;
}

.section-header {
  display: flex;
  align-items: baseline;
  gap: 1rem;
  margin-bottom: 3rem;
}

.section-tag {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--primary);
  background: rgba(255,204,0,0.1);
  padding: 4px 10px;
  border-radius: 4px;
}

.section-title {
  font-family: var(--font-display);
  font-size: clamp(2rem, 5vw, 3.5rem);
  letter-spacing: 4px;
  color: var(--text);
}

.section-divider {
  height: 1px;
  background: linear-gradient(to right, var(--primary), transparent);
  flex: 1;
  opacity: 0.3;
  margin-left: 1rem;
}

/* ===================== GAMES ===================== */
.games-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 1.5rem;
}

.game-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
  cursor: pointer;
  transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  position: relative;
}

.game-card:hover {
  transform: translateY(-8px);
  border-color: rgba(255,255,255,0.2);
  box-shadow: 0 32px 64px rgba(0,0,0,0.5);
}

.game-thumb {
  position: relative;
  overflow: hidden;
  height: 220px;
  background: #111;
}

.game-thumb-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.5s ease;
}

.game-card:hover .game-thumb-img {
  transform: scale(1.08);
}

/* Placeholder gradient for missing images */
.thumb-placeholder {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-display);
  font-size: 4rem;
  letter-spacing: 4px;
}

.thumb-z { background: linear-gradient(135deg, #001a14, #003326, #00513c); color: var(--accent-z); }
.thumb-racer { background: linear-gradient(135deg, #1a0000, #330000, #510000); color: var(--accent-racer); }

.thumb-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.3s;
}

.game-card:hover .thumb-overlay {
  opacity: 1;
}

.thumb-btn {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  padding: 12px 28px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  transition: all 0.2s;
}

.thumb-btn.play { background: var(--primary); color: #000; }
.thumb-btn.coming { background: var(--accent-z); color: #000; }

.game-status {
  position: absolute;
  top: 12px;
  right: 12px;
  font-family: var(--font-mono);
  font-size: 0.6rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 4px 10px;
  border-radius: 20px;
}

.status-live { background: rgba(255,204,0,0.2); color: var(--primary); border: 1px solid rgba(255,204,0,0.4); }
.status-dev { background: rgba(0,255,204,0.1); color: var(--accent-z); border: 1px solid rgba(0,255,204,0.3); }

.game-body {
  padding: 1.5rem;
}

.game-name {
  font-family: var(--font-display);
  font-size: 1.8rem;
  letter-spacing: 3px;
  margin-bottom: 0.4rem;
}

.game-desc {
  font-size: 0.88rem;
  color: var(--muted);
  line-height: 1.6;
  margin-bottom: 1rem;
}

.game-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 0.4rem;
}

.tag {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 3px 8px;
  border-radius: 4px;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--muted);
}

.game-card.protocol-z { border-top: 3px solid var(--accent-z); }
.game-card.rapid-racer { border-top: 3px solid var(--accent-racer); }

.game-name.z { color: var(--accent-z); }
.game-name.racer { color: var(--accent-racer); }

/* ===================== DEVLOG ===================== */
#devlog { background: rgba(255,255,255,0.01); }

.devlog-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 1.5rem;
}

.devlog-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 1.5rem;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
  cursor: pointer;
}

.devlog-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--accent-devlog);
  opacity: 0;
  transition: opacity 0.3s;
}

.devlog-card:hover {
  transform: translateY(-4px);
  border-color: rgba(167,139,250,0.3);
  background: var(--surface-hover);
}

.devlog-card:hover::before { opacity: 1; }

.devlog-meta {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  margin-bottom: 1rem;
}

.devlog-number {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--accent-devlog);
  background: rgba(167,139,250,0.1);
  border: 1px solid rgba(167,139,250,0.2);
  padding: 3px 8px;
  border-radius: 4px;
}

.devlog-date {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  letter-spacing: 1px;
  color: var(--muted);
}

.devlog-game-tag {
  margin-left: auto;
  font-family: var(--font-mono);
  font-size: 0.55rem;
  letter-spacing: 1px;
  padding: 3px 8px;
  border-radius: 4px;
}

.devlog-game-tag.z { background: rgba(0,255,204,0.1); color: var(--accent-z); border: 1px solid rgba(0,255,204,0.2); }
.devlog-game-tag.racer { background: rgba(255,68,68,0.1); color: var(--accent-racer); border: 1px solid rgba(255,68,68,0.2); }

.devlog-title {
  font-family: var(--font-display);
  font-size: 1.3rem;
  letter-spacing: 2px;
  margin-bottom: 0.6rem;
  color: var(--text);
  line-height: 1.2;
}

.devlog-excerpt {
  font-size: 0.85rem;
  color: var(--muted);
  line-height: 1.65;
  margin-bottom: 1.2rem;
}

.devlog-read-more {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  font-family: var(--font-mono);
  font-size: 0.65rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--accent-devlog);
  text-decoration: none;
  transition: gap 0.2s;
}

.devlog-read-more:hover { gap: 0.7rem; }

.devlog-read-more svg { width: 12px; height: 12px; }

.devlog-cta {
  text-align: center;
  margin-top: 2.5rem;
}

/* ===================== ABOUT ===================== */
.about-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4rem;
  align-items: center;
}

.about-text p {
  font-size: 1rem;
  color: var(--muted);
  line-height: 1.8;
  margin-bottom: 1rem;
}

.about-text p:last-of-type { margin-bottom: 1.5rem; }

.about-text strong { color: var(--text); font-weight: 500; }

.about-stack {
  display: flex;
  flex-direction: column;
  gap: 1rem;
}

.stack-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1rem 1.25rem;
  display: flex;
  align-items: center;
  gap: 1rem;
  transition: all 0.25s;
}

.stack-item:hover {
  border-color: rgba(255,204,0,0.3);
  background: var(--surface-hover);
  transform: translateX(4px);
}

.stack-icon {
  font-size: 1.5rem;
  width: 40px;
  text-align: center;
}

.stack-info .name {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--text);
}

.stack-info .desc {
  font-size: 0.78rem;
  color: var(--muted);
  margin-top: 2px;
}

/* ===================== NEWSLETTER ===================== */
.newsletter-section {
  position: relative;
  z-index: 1;
  background: linear-gradient(135deg, rgba(255,204,0,0.04), rgba(0,255,204,0.02));
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  padding: 5rem 1.5rem;
  text-align: center;
  overflow: hidden;
}

.newsletter-glow {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 600px; height: 300px;
  background: radial-gradient(ellipse, rgba(255,204,0,0.06), transparent);
  pointer-events: none;
}

.newsletter-inner {
  position: relative;
  max-width: 560px;
  margin: auto;
}

.newsletter-inner .section-tag {
  margin-bottom: 1.5rem;
  display: inline-block;
}

.newsletter-inner h2 {
  font-family: var(--font-display);
  font-size: clamp(2rem, 5vw, 3rem);
  letter-spacing: 4px;
  color: var(--text);
  margin-bottom: 1rem;
}

.newsletter-inner p {
  color: var(--muted);
  font-size: 0.95rem;
  line-height: 1.7;
  margin-bottom: 2rem;
}

.newsletter-form {
  display: flex;
  gap: 0.75rem;
  flex-wrap: wrap;
  justify-content: center;
}

.newsletter-form input {
  flex: 1;
  min-width: 220px;
  padding: 14px 18px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 0.75rem;
  letter-spacing: 1px;
  outline: none;
  transition: border-color 0.25s;
}

.newsletter-form input::placeholder { color: rgba(255,255,255,0.25); }

.newsletter-form input:focus { border-color: rgba(255,204,0,0.5); }

.newsletter-form button {
  padding: 14px 28px;
  background: var(--primary);
  color: #000;
  font-family: var(--font-mono);
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.25s;
}

.newsletter-form button:hover {
  box-shadow: var(--glow-yellow);
  transform: translateY(-1px);
}

.newsletter-note {
  margin-top: 1rem;
  font-family: var(--font-mono);
  font-size: 0.6rem;
  letter-spacing: 1px;
  color: rgba(255,255,255,0.2);
}

/* ===================== TOAST ===================== */
.toast {
  position: fixed;
  bottom: 2rem;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: #111;
  border: 1px solid rgba(255,204,0,0.4);
  color: var(--primary);
  font-family: var(--font-mono);
  font-size: 0.75rem;
  letter-spacing: 2px;
  padding: 12px 24px;
  border-radius: 8px;
  opacity: 0;
  transition: all 0.3s ease;
  z-index: 9999;
  pointer-events: none;
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ===================== FOOTER ===================== */
footer {
  position: relative;
  z-index: 1;
  padding: 3rem 2rem;
  border-top: 1px solid var(--border);
}

.footer-inner {
  max-width: 1100px;
  margin: auto;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 1.5rem;
}

.footer-brand {
  font-family: var(--font-display);
  font-size: 1.2rem;
  letter-spacing: 3px;
  color: var(--primary);
}

.footer-links {
  display: flex;
  gap: 1.5rem;
  list-style: none;
}

.footer-links a {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  text-decoration: none;
  transition: color 0.2s;
}

.footer-links a:hover { color: var(--primary); }

.footer-copy {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  letter-spacing: 1px;
  color: rgba(255,255,255,0.15);
}

/* ===================== MODAL ===================== */
#gameModal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.92);
  justify-content: center;
  align-items: center;
  z-index: 1000;
  backdrop-filter: blur(12px);
  padding: 1rem;
}

#gameModal.open { display: flex; }

.modal-inner {
  position: relative;
  width: 100%;
  max-width: 1152px;
}

.modal-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.75rem 0;
  margin-bottom: 0.5rem;
}

.modal-title {
  font-family: var(--font-display);
  font-size: 1.2rem;
  letter-spacing: 3px;
  color: var(--accent-racer);
}

.modal-close {
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 1.2rem;
  cursor: pointer;
  transition: all 0.2s;
  line-height: 1;
}

.modal-close:hover {
  background: rgba(255,68,68,0.2);
  border-color: var(--accent-racer);
  color: var(--accent-racer);
}

#gameFrame {
  width: 100%;
  aspect-ratio: 16/9;
  max-height: 80vh;
  border: none;
  border-radius: 12px;
  display: none;
  background: #000;
}
