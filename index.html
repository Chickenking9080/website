<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Turbo Chook Games</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #f5c518;
    --cyan: #00ffe7;
    --red: #ff3c3c;
    --bg: #040810;
    --card-bg: rgba(255,255,255,0.03);
    --glow-gold: 0 0 20px rgba(245,197,24,0.5);
    --glow-cyan: 0 0 20px rgba(0,255,231,0.5);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Rajdhani', sans-serif;
    background: var(--bg);
    color: #fff;
    overflow-x: hidden;
  }

  /* \u2500\u2500 STAR CANVAS \u2500\u2500 */
  #starfield {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  /* \u2500\u2500 NAV \u2500\u2500 */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 48px;
    background: rgba(4,8,16,0.7);
    backdrop-filter: blur(14px);
    border-bottom: 1px solid rgba(245,197,24,0.15);
  }

  .nav-logo {
    display: flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
  }

  .nav-logo img {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    border: 2px solid var(--gold);
    box-shadow: var(--glow-gold);
  }

  .nav-logo span {
    font-family: 'Orbitron', monospace;
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .nav-links {
    display: flex;
    gap: 36px;
    list-style: none;
  }

  .nav-links a {
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    color: rgba(255,255,255,0.6);
    text-decoration: none;
    text-transform: uppercase;
    transition: color 0.3s;
    position: relative;
  }

  .nav-links a::after {
    content: '';
    position: absolute;
    bottom: -4px; left: 0; right: 0;
    height: 1px;
    background: var(--gold);
    transform: scaleX(0);
    transition: transform 0.3s;
    transform-origin: left;
  }

  .nav-links a:hover { color: var(--gold); }
  .nav-links a:hover::after { transform: scaleX(1); }

  /* \u2500\u2500 HERO \u2500\u2500 */
  .hero {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 120px 24px 80px;
  }

  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(245,197,24,0.1);
    border: 1px solid rgba(245,197,24,0.3);
    border-radius: 100px;
    padding: 6px 18px;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 32px;
    opacity: 0;
    animation: fadeUp 0.8s 0.3s forwards;
  }

  .hero-badge span { color: var(--cyan); }

  .logo-ring {
    position: relative;
    width: 130px;
    height: 130px;
    margin: 0 auto 40px;
    opacity: 0;
    animation: fadeUp 0.8s 0.1s forwards;
  }

  .logo-ring svg.ring {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    animation: spin 8s linear infinite;
  }

  .logo-ring img {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 90px;
    height: 90px;
    border-radius: 50%;
    border: 2px solid var(--gold);
  }

  .hero h1 {
    font-family: 'Orbitron', monospace;
    font-size: clamp(3rem, 10vw, 7.5rem);
    font-weight: 900;
    line-height: 0.95;
    letter-spacing: -0.02em;
    opacity: 0;
    animation: fadeUp 0.8s 0.5s forwards;
  }

  .hero h1 .word-build { color: var(--gold); }
  .hero h1 .word-survive {
    -webkit-text-stroke: 2px var(--cyan);
    color: transparent;
    text-shadow: 0 0 40px rgba(0,255,231,0.3);
  }
  .hero h1 .word-race { color: var(--red); text-shadow: 0 0 40px rgba(255,60,60,0.4); }
  .hero h1 .dot { color: rgba(255,255,255,0.2); }

  .hero-sub {
    font-size: 1.15rem;
    font-weight: 400;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.08em;
    margin-top: 20px;
    margin-bottom: 48px;
    opacity: 0;
    animation: fadeUp 0.8s 0.7s forwards;
  }

  .hero-ctas {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    justify-content: center;
    opacity: 0;
    animation: fadeUp 0.8s 0.9s forwards;
  }

  .btn-primary {
    position: relative;
    padding: 14px 36px;
    background: var(--gold);
    color: #000;
    font-family: 'Orbitron', monospace;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    text-decoration: none;
    border: none;
    cursor: pointer;
    clip-path: polygon(10px 0%, 100% 0%, calc(100% - 10px) 100%, 0% 100%);
    transition: all 0.3s;
    overflow: hidden;
  }

  .btn-primary::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.3);
    transform: translateX(-100%) skewX(-20deg);
    transition: transform 0.4s;
  }

  .btn-primary:hover::before { transform: translateX(200%) skewX(-20deg); }
  .btn-primary:hover { box-shadow: var(--glow-gold), 0 8px 30px rgba(245,197,24,0.4); transform: translateY(-2px); }

  .btn-secondary {
    padding: 13px 36px;
    background: transparent;
    color: var(--gold);
    font-family: 'Orbitron', monospace;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    text-decoration: none;
    border: 1px solid var(--gold);
    clip-path: polygon(10px 0%, 100% 0%, calc(100% - 10px) 100%, 0% 100%);
    transition: all 0.3s;
  }

  .btn-secondary:hover {
    background: rgba(245,197,24,0.1);
    box-shadow: var(--glow-gold);
    transform: translateY(-2px);
  }

  /* scroll indicator */
  .scroll-hint {
    position: absolute;
    bottom: 36px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.25);
    opacity: 0;
    animation: fadeUp 1s 1.5s forwards;
  }

  .scroll-hint .arrow {
    width: 20px;
    height: 20px;
    border-right: 1px solid rgba(245,197,24,0.4);
    border-bottom: 1px solid rgba(245,197,24,0.4);
    transform: rotate(45deg);
    animation: bounce 1.5s ease-in-out infinite;
  }

  /* \u2500\u2500 STATS \u2500\u2500 */
  .stats-bar {
    position: relative;
    z-index: 1;
    display: flex;
    justify-content: center;
    gap: 0;
    border-top: 1px solid rgba(255,255,255,0.06);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    background: rgba(255,255,255,0.02);
  }

  .stat-item {
    flex: 1;
    max-width: 240px;
    text-align: center;
    padding: 36px 24px;
    border-right: 1px solid rgba(255,255,255,0.06);
  }

  .stat-item:last-child { border-right: none; }

  .stat-number {
    font-family: 'Orbitron', monospace;
    font-size: 2.4rem;
    font-weight: 900;
    color: var(--gold);
    text-shadow: var(--glow-gold);
    display: block;
  }

  .stat-label {
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
    margin-top: 4px;
    display: block;
  }

  /* \u2500\u2500 SECTION COMMON \u2500\u2500 */
  section {
    position: relative;
    z-index: 1;
  }

  .section-header {
    text-align: center;
    margin-bottom: 64px;
  }

  .section-eyebrow {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--cyan);
    margin-bottom: 12px;
    display: block;
  }

  .section-title {
    font-family: 'Orbitron', monospace;
    font-size: clamp(1.8rem, 4vw, 3rem);
    font-weight: 900;
    color: #fff;
  }

  /* \u2500\u2500 GAMES SECTION \u2500\u2500 */
  #games {
    padding: 100px 48px;
  }

  .games-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
    gap: 24px;
    max-width: 1100px;
    margin: 0 auto;
  }

  .game-card {
    position: relative;
    background: var(--card-bg);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 4px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.4s cubic-bezier(0.23,1,0.32,1), border-color 0.3s, box-shadow 0.3s;
    opacity: 0;
    transform: translateY(40px);
  }

  .game-card.visible {
    animation: cardReveal 0.7s cubic-bezier(0.23,1,0.32,1) forwards;
  }

  .game-card:nth-child(2) { animation-delay: 0.15s; }

  .game-card:hover {
    transform: translateY(-8px) scale(1.01);
    border-color: rgba(245,197,24,0.3);
    box-shadow: 0 24px 60px rgba(0,0,0,0.6), var(--glow-gold);
  }

  .game-card:hover .card-overlay { opacity: 1; }
  .game-card:hover .card-thumb img { transform: scale(1.06); }
  .game-card:hover .game-tag { opacity: 1; transform: translateX(0); }

  .card-thumb {
    width: 100%;
    aspect-ratio: 16/9;
    overflow: hidden;
    position: relative;
  }

  .card-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.6s cubic-bezier(0.23,1,0.32,1);
    display: block;
  }

  .card-thumb-placeholder {
    width: 100%;
    aspect-ratio: 16/9;
    position: relative;
    overflow: hidden;
  }

  .card-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(245,197,24,0.15), rgba(0,255,231,0.1));
    opacity: 0;
    transition: opacity 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .play-icon {
    width: 56px;
    height: 56px;
    border: 2px solid rgba(255,255,255,0.8);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(8px);
    background: rgba(0,0,0,0.3);
  }

  .play-icon svg { transform: translateX(2px); }

  .card-body {
    padding: 24px 24px 28px;
  }

  .game-tag {
    display: inline-block;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 2px;
    margin-bottom: 10px;
    opacity: 0;
    transform: translateX(-10px);
    transition: opacity 0.3s 0.1s, transform 0.3s 0.1s;
  }

  .tag-zombie { background: rgba(0,255,231,0.15); color: var(--cyan); border: 1px solid rgba(0,255,231,0.3); }
  .tag-racing { background: rgba(255,60,60,0.15); color: var(--red); border: 1px solid rgba(255,60,60,0.3); }

  .card-title {
    font-family: 'Orbitron', monospace;
    font-size: 1.25rem;
    font-weight: 700;
    color: #fff;
    margin-bottom: 10px;
  }

  .card-desc {
    font-size: 0.95rem;
    font-weight: 400;
    color: rgba(255,255,255,0.45);
    line-height: 1.6;
    margin-bottom: 20px;
  }

  .card-link {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gold);
    text-decoration: none;
    transition: gap 0.2s;
  }

  .card-link:hover { gap: 14px; }

  .card-link svg { transition: transform 0.2s; }
  .card-link:hover svg { transform: translateX(4px); }

  /* \u2500\u2500 FEATURE STRIP \u2500\u2500 */
  #features {
    padding: 80px 48px;
    background: linear-gradient(180deg, transparent, rgba(245,197,24,0.03), transparent);
  }

  .features-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 2px;
    max-width: 1100px;
    margin: 0 auto;
  }

  .feature-item {
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.05);
    padding: 40px 28px;
    text-align: center;
    transition: background 0.3s, border-color 0.3s, transform 0.3s;
    position: relative;
    overflow: hidden;
  }

  .feature-item::before {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: var(--gold);
    transform: scaleX(0);
    transition: transform 0.4s cubic-bezier(0.23,1,0.32,1);
    transform-origin: left;
  }

  .feature-item:hover {
    background: rgba(245,197,24,0.04);
    border-color: rgba(245,197,24,0.15);
    transform: translateY(-4px);
  }

  .feature-item:hover::before { transform: scaleX(1); }

  .feature-icon {
    font-size: 2.4rem;
    margin-bottom: 16px;
    display: block;
    filter: drop-shadow(0 0 12px rgba(245,197,24,0.4));
  }

  .feature-name {
    font-family: 'Orbitron', monospace;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #fff;
    margin-bottom: 8px;
  }

  .feature-desc {
    font-size: 0.875rem;
    color: rgba(255,255,255,0.4);
    line-height: 1.6;
  }

  /* \u2500\u2500 ABOUT \u2500\u2500 */
  #about {
    padding: 100px 48px;
    max-width: 1100px;
    margin: 0 auto;
  }

  .about-inner {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 80px;
    align-items: center;
  }

  .about-text .section-header { text-align: left; margin-bottom: 24px; }

  .about-body {
    font-size: 1.05rem;
    color: rgba(255,255,255,0.5);
    line-height: 1.8;
    margin-bottom: 32px;
  }

  .about-engine {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 4px;
    padding: 10px 18px;
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: rgba(255,255,255,0.6);
  }

  .about-engine span { color: var(--cyan); font-weight: 700; }

  .about-visual {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .hex-grid {
    display: grid;
    grid-template-columns: repeat(3, 80px);
    gap: 8px;
    opacity: 0.6;
  }

  .hex {
    width: 80px;
    height: 90px;
    background: rgba(245,197,24,0.05);
    border: 1px solid rgba(245,197,24,0.12);
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.6rem;
    animation: hexPulse var(--dur, 3s) ease-in-out infinite;
    animation-delay: var(--delay, 0s);
    transition: background 0.3s;
  }

  .hex:hover { background: rgba(245,197,24,0.12); }

  /* \u2500\u2500 FOOTER \u2500\u2500 */
  footer {
    position: relative;
    z-index: 1;
    border-top: 1px solid rgba(255,255,255,0.06);
    padding: 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 24px;
  }

  .footer-logo {
    font-family: 'Orbitron', monospace;
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .footer-copy {
    font-size: 0.8rem;
    color: rgba(255,255,255,0.2);
    letter-spacing: 0.05em;
  }

  .footer-links {
    display: flex;
    gap: 28px;
    list-style: none;
  }

  .footer-links a {
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
    text-decoration: none;
    transition: color 0.2s;
  }

  .footer-links a:hover { color: var(--gold); }

  /* \u2500\u2500 GAME SCREENSHOTS \u2500\u2500 */
  .proto-z-bg {
    background: linear-gradient(135deg, #1a3d1a 0%, #0d2d1a 50%, #0a1f0a 100%);
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 200px;
    position: relative;
    overflow: hidden;
  }

  .proto-z-bg::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 30% 60%, rgba(0,255,100,0.1) 0%, transparent 50%),
      radial-gradient(circle at 70% 40%, rgba(0,200,80,0.08) 0%, transparent 50%);
  }

  .racer-bg {
    background: linear-gradient(135deg, #1a1a2e 0%, #0a0a18 100%);
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 200px;
    position: relative;
    overflow: hidden;
  }

  .game-preview-canvas {
    width: 100%;
    aspect-ratio: 16/9;
    display: block;
  }

  /* \u2500\u2500 ANIMATIONS \u2500\u2500 */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  @keyframes bounce {
    0%, 100% { transform: rotate(45deg) translateY(0); }
    50% { transform: rotate(45deg) translateY(6px); }
  }

  @keyframes cardReveal {
    from { opacity: 0; transform: translateY(40px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes hexPulse {
    0%, 100% { background: rgba(245,197,24,0.04); }
    50% { background: rgba(245,197,24,0.1); }
  }

  @keyframes scanline {
    0% { transform: translateY(-100%); }
    100% { transform: translateY(100%); }
  }

  @keyframes glitch1 {
    0%, 100% { clip-path: inset(0 0 100% 0); }
    10% { clip-path: inset(20% 0 60% 0); transform: translateX(-4px); }
    20% { clip-path: inset(50% 0 30% 0); transform: translateX(4px); }
    30% { clip-path: inset(0 0 100% 0); }
  }

  /* \u2500\u2500 SCANLINE OVERLAY \u2500\u2500 */
  .scanlines {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.015) 2px,
      rgba(0,0,0,0.015) 4px
    );
  }

  /* \u2500\u2500 CURSOR DOT \u2500\u2500 */
  .cursor-dot {
    width: 8px;
    height: 8px;
    background: var(--gold);
    border-radius: 50%;
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: transform 0.1s, width 0.2s, height 0.2s, background 0.2s;
    mix-blend-mode: difference;
  }

  .cursor-ring {
    width: 36px;
    height: 36px;
    border: 1px solid rgba(245,197,24,0.5);
    border-radius: 50%;
    position: fixed;
    pointer-events: none;
    z-index: 9998;
    transform: translate(-50%, -50%);
    transition: transform 0.15s ease-out, width 0.3s, height 0.3s;
  }

  /* \u2500\u2500 RESPONSIVE \u2500\u2500 */
  @media (max-width: 768px) {
    nav { padding: 16px 24px; }
    .nav-links { display: none; }
    #games { padding: 80px 24px; }
    .about-inner { grid-template-columns: 1fr; gap: 48px; }
    #about { padding: 80px 24px; }
    #features { padding: 60px 24px; }
    footer { padding: 36px 24px; flex-direction: column; text-align: center; }
    .stats-bar { flex-wrap: wrap; }
    .stat-item { min-width: 50%; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .hex-grid { display: none; }
    .about-visual { display: none; }
  }
</style>
</head>
<body>

<canvas id="starfield"></canvas>
<div class="scanlines"></div>
<div class="cursor-dot" id="cursorDot"></div>
<div class="cursor-ring" id="cursorRing"></div>

<!-- NAV -->
<nav>
  <a href="#" class="nav-logo">
    <svg width="42" height="42" viewBox="0 0 42 42">
      <circle cx="21" cy="21" r="20" fill="#00c4c4"/>
